
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafafa;--bg2:#fff;--border:#e8e8e8;--border2:#d0d0d0;
  --text:#111;--text2:#666;--text3:#aaa;
  --accent:#111;--accent2:#444;
  --green:#16a34a;--red:#dc2626;--blue:#2563eb;
  --purple:#7c3aed;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow-x:hidden}

/* ── 잠금화면 ── */
#lock{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center}
.lock-box{text-align:center;width:280px}
.lock-label{font-size:10px;letter-spacing:.2em;color:#aaa;margin-bottom:14px}
.lock-input-wrap{position:relative;margin-bottom:12px}
#lock-input{width:100%;background:#f9f9f9;border:.5px solid #e0e0e0;border-radius:8px;color:#111;font-size:15px;padding:13px 40px 13px 16px;outline:none;text-align:center;letter-spacing:.2em;font-family:'Noto Sans KR',sans-serif;transition:border-color .2s}
#lock-input:focus{border-color:#111}
#lock-input.err{border-color:#dc2626;animation:shake .35s ease}
.lock-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:13px;cursor:pointer;opacity:.3}
#lock-btn{width:100%;padding:13px;background:transparent;border:none;color:transparent;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.lock-err{font-size:11px;color:#dc2626;margin-top:8px;height:16px}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}

/* ── 앱 ── */
#app{display:none;min-height:100vh;flex-direction:column}

/* ── 헤더 ── */
header{background:#fff;border-bottom:.5px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:16px}
.site-title{font-size:14px;font-weight:700;letter-spacing:.15em;color:#111}
.stats-bar{display:flex;gap:16px}
.stat-item{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.stat-num{font-weight:700;color:var(--text)}
.btn-add-artist{display:flex;align-items:center;gap:6px;padding:8px 16px;background:#111;border:none;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;border-radius:6px;cursor:pointer;transition:opacity .2s;letter-spacing:.05em}
.btn-add-artist:hover{opacity:.75}

/* ── 바디 ── */
.body{display:flex;flex:1}

/* ── 사이드바 ── */
.sidebar{width:220px;background:#fff;border-right:.5px solid var(--border);flex-shrink:0;overflow-y:auto;padding:16px 0}
.sidebar-label{font-size:9px;letter-spacing:.15em;color:var(--text3);padding:0 16px;margin-bottom:8px}
.artist-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background .15s;border-left:2px solid transparent;position:relative}
.artist-item:hover{background:#f5f5f5}
.artist-item.active{background:#f0f0f0;border-left-color:#111}
.artist-avatar{width:52px;height:52px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#888;position:relative}
.artist-avatar img{width:100%;height:100%;object-fit:cover}
.artist-avatar-edit{position:absolute;inset:0;background:rgba(0,0,0,0.45);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;font-size:11px;color:#fff;cursor:pointer}
.artist-avatar:hover .artist-avatar-edit{opacity:1}
.artist-info{min-width:0;flex:1}
.artist-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.artist-sub{font-size:10px;color:var(--text3);margin-top:2px}

/* ── 메인 ── */
.main{flex:1;padding:24px;overflow-y:auto}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.main-title{font-size:16px;font-weight:700}
.main-actions{display:flex;gap:8px}
.btn-sm{padding:7px 14px;background:transparent;border:.5px solid var(--border2);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:11px;border-radius:6px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:5px}
.btn-sm:hover{background:#f5f5f5}
.btn-sm.primary{background:#111;border-color:#111;color:#fff}
.btn-sm.primary:hover{opacity:.8}

/* ── 앨범 그리드 ── */
.album-section{margin-bottom:32px}
.album-section-title{font-size:10px;letter-spacing:.12em;color:var(--text3);margin-bottom:12px;padding-bottom:8px;border-bottom:.5px solid var(--border)}
.album-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.album-card{background:#fff;border:.5px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s}
.album-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.06)}
.album-card.selected{border-color:#111;box-shadow:0 0 0 1px #111}
.album-thumb{aspect-ratio:1;background:#f0f0f0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.album-thumb img{width:100%;height:100%;object-fit:cover}
.album-thumb-placeholder{font-size:32px;color:#ccc}
.owned-badge{position:absolute;top:6px;right:6px;background:#16a34a;color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px}
.not-owned-badge{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.08);color:#888;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px}
.album-body{padding:10px}
.album-title{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.album-meta{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:500}
.tag-type{background:#f0f0f0;color:#555}
.tag-owned{background:#dcfce7;color:#16a34a}
.tag-notowned{background:#f5f5f5;color:#aaa}

/* ── 버전 패널 ── */
.version-panel{background:#fff;border:.5px solid var(--border);border-radius:10px;padding:20px;margin-top:20px}
.vp-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.vp-title{font-size:14px;font-weight:700}
.vp-sub{font-size:11px;color:var(--text3);margin-top:2px}
.version-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.ver-card{background:#fafafa;border:.5px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:all .15s}
.ver-card:hover{border-color:var(--border2)}
.ver-card.selected{border-color:#111;background:#fff}
.ver-thumb{aspect-ratio:1;background:#f0f0f0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.ver-thumb img{width:100%;height:100%;object-fit:cover}
.ver-body{padding:8px}
.ver-name{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.ver-owned{font-size:10px;color:var(--green);font-weight:700}
.ver-notowned{font-size:10px;color:var(--text3)}
.add-ver-btn{border:.5px dashed var(--border2);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;min-height:80px;color:var(--text3);font-size:11px;flex-direction:column;gap:4px;transition:all .15s;background:transparent}
.add-ver-btn:hover{background:#f5f5f5;border-color:#999}

/* ── 버전 상세 ── */
.ver-detail{background:#fafafa;border:.5px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.vd-top{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px}
.vd-img{width:72px;height:72px;border-radius:6px;background:#e8e8e8;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.vd-img img{width:100%;height:100%;object-fit:cover}
.vd-img-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:10px;color:#fff;text-align:center}
.vd-img:hover .vd-img-overlay{opacity:1}
.vd-info{flex:1}
.vd-name{font-size:13px;font-weight:700;margin-bottom:4px}
.vd-owned-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.vd-owned-label{font-size:11px;color:var(--text2)}
.owned-counter{display:flex;align-items:center;gap:8px}
.counter-btn{width:28px;height:28px;border:.5px solid var(--border2);background:#fff;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.counter-btn:hover{background:#f0f0f0}
.counter-num{font-size:16px;font-weight:700;min-width:24px;text-align:center}
.vd-actions{display:flex;gap:6px;margin-top:10px}

/* ── 트랙 ── */
.track-section{border-top:.5px solid var(--border);padding-top:14px}
.track-label{font-size:10px;letter-spacing:.12em;color:var(--text3);margin-bottom:10px}
.track-row{display:flex;align-items:center;gap:10px;padding:6px 4px;border-radius:6px}
.track-row:hover{background:#f5f5f5}
.track-num{font-size:10px;color:var(--text3);width:20px;text-align:right;flex-shrink:0}
.track-name{font-size:12px;flex:1}
.track-title-tag{font-size:9px;padding:1px 6px;background:#f0f0f0;color:#555;border-radius:4px}

/* ── 소장 요약 ── */
.own-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}
.sum-card{background:#fafafa;border:.5px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.sum-num{font-size:20px;font-weight:700}
.sum-label{font-size:9px;color:var(--text3);letter-spacing:.08em;margin-top:2px}

/* ── 빈 상태 ── */
.empty{text-align:center;padding:80px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.3}
.empty-text{font-size:13px;line-height:1.8}

/* ── 모달 ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:440px;transform:translateY(12px);transition:transform .25s;max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.1em;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:#fafafa;border:.5px solid var(--border);border-radius:6px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:10px 12px;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#111}
.form-group textarea{resize:vertical;min-height:80px;line-height:1.6}
.form-group select option{background:#fff}
.img-upload-area{border:.5px dashed var(--border2);border-radius:6px;padding:16px;text-align:center;cursor:pointer;transition:all .15s;background:#fafafa}
.img-upload-area:hover{background:#f0f0f0;border-color:#999}
.img-upload-area input{display:none}
.img-preview{width:80px;height:80px;border-radius:6px;object-fit:cover;margin:0 auto 8px;display:block}
.img-upload-hint{font-size:11px;color:var(--text3);line-height:1.5}
.modal-footer{display:flex;gap:8px;margin-top:20px}
.btn-cancel{flex:1;padding:10px;background:transparent;border:.5px solid var(--border);color:var(--text2);font-family:'Noto Sans KR',sans-serif;font-size:13px;border-radius:6px;cursor:pointer;transition:all .18s}
.btn-cancel:hover{background:#f5f5f5}
.btn-save{flex:2;padding:10px;background:#111;border:none;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;border-radius:6px;cursor:pointer;transition:opacity .18s}
.btn-save:hover{opacity:.8}
.btn-save:disabled{opacity:.4;cursor:not-allowed}

/* ── 토스트 ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#111;color:#fff;font-size:12px;padding:10px 20px;border-radius:6px;opacity:0;transition:all .25s;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:#16a34a}
.toast.err{background:#dc2626}

/* ── AI 로딩 ── */
.ai-loading{display:none;align-items:center;gap:10px;padding:16px;background:#fafafa;border:.5px solid var(--border);border-radius:8px;margin-bottom:16px;font-size:12px;color:var(--text2)}
.ai-loading.show{display:flex}
.spinner{width:16px;height:16px;border:2px solid #e0e0e0;border-top-color:#111;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:640px){
  .sidebar{width:64px}
  .artist-name,.artist-sub{display:none}
  .stats-bar{display:none}
  .main{padding:16px}
  .album-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .own-summary{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- 잠금화면 -->
<div id="lock">
  <div class="lock-box">
    <div class="lock-label">ENTER PASSWORD</div>
    <div class="lock-input-wrap">
      <input type="password" id="lock-input" placeholder="••••••••••" onkeydown="if(event.key==='Enter')unlock()">
      <span class="lock-eye" onclick="toggleLockEye()">👁</span>
    </div>
    <button id="lock-btn" onclick="unlock()">입장</button>
    <div class="lock-err" id="lock-err"></div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="site-title">COLLECTION</div>
      <div class="stats-bar">
        <div class="stat-item">가수 <span class="stat-num" id="stat-artists">0</span></div>
        <div class="stat-item">앨범 <span class="stat-num" id="stat-albums">0</span></div>
        <div class="stat-item">소장 <span class="stat-num" id="stat-owned">0</span>장</div>
      </div>
    </div>
    <button class="btn-add-artist" onclick="openArtistModal()">+ 가수 추가</button>
  </header>

  <div class="body">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-label">ARTISTS</div>
    </div>
    <div class="main" id="main">
      <div class="empty">
        <div class="empty-icon">🎵</div>
        <div class="empty-text">왼쪽에서 가수를 선택하거나<br>가수를 추가해보세요!</div>
      </div>
    </div>
  </div>
</div>

<!-- 가수 추가 모달 -->
<div class="modal-overlay" id="artist-modal" onclick="handleOverlay(event,'artist-modal')">
  <div class="modal">
    <h3 id="artist-modal-title">가수 추가</h3>
    <div class="ai-loading" id="ai-loading">
      <div class="spinner"></div>
      <span id="ai-loading-text">AI가 앨범 정보를 가져오는 중...</span>
    </div>
    <div class="form-group">
      <label>가수 이름</label>
      <input type="text" id="f-artist-name" placeholder="예: 에스파">
    </div>
    <div class="form-group">
      <label>프로필 이미지</label>
      <div class="img-upload-area" onclick="document.getElementById('f-artist-img-file').click()">
        <input type="file" id="f-artist-img-file" accept="image/*" onchange="previewImg(this,'artist-img-preview','f-artist-img-url')">
        <img id="artist-img-preview" class="img-preview" style="display:none">
        <div class="img-upload-hint">📁 클릭해서 이미지 업로드<br><span style="color:#ccc">또는</span></div>
      </div>
      <input type="text" id="f-artist-img-url" placeholder="이미지 URL 직접 입력" style="margin-top:6px" oninput="syncImgUrl(this,'artist-img-preview')">
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('artist-modal')">취소</button>
      <button class="btn-save" id="artist-save-btn" onclick="saveArtist()">추가하기</button>
    </div>
  </div>
</div>

<!-- 앨범 추가 모달 -->
<div class="modal-overlay" id="album-modal" onclick="handleOverlay(event,'album-modal')">
  <div class="modal">
    <h3>앨범 추가</h3>
    <div class="form-group">
      <label>앨범 제목</label>
      <input type="text" id="f-album-title" placeholder="예: Armageddon">
    </div>
    <div class="form-group">
      <label>종류</label>
      <select id="f-album-type">
        <option>정규</option><option>미니앨범</option><option>싱글</option><option>EP</option><option>리패키지</option><option>컴필레이션</option>
      </select>
    </div>
    <div class="form-group">
      <label>발매일</label>
      <input type="text" id="f-album-date" placeholder="예: 2024.05.22">
    </div>
    <div class="form-group">
      <label>수록곡 (줄바꿈으로 구분, 타이틀곡 앞에 * 표시)</label>
      <textarea id="f-album-tracks" placeholder="*Armageddon&#10;Supernova&#10;Intro: Ascent&#10;Lucky Girl Syndrome"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('album-modal')">취소</button>
      <button class="btn-save" onclick="saveAlbum()">저장</button>
    </div>
  </div>
</div>

<!-- 버전 추가 모달 -->
<div class="modal-overlay" id="ver-modal" onclick="handleOverlay(event,'ver-modal')">
  <div class="modal">
    <h3>버전 추가</h3>
    <div class="form-group">
      <label>버전 이름</label>
      <input type="text" id="f-ver-name" placeholder="예: Poster Ver.">
    </div>
    <div class="form-group">
      <label>커버 이미지</label>
      <div class="img-upload-area" onclick="document.getElementById('f-ver-img-file').click()">
        <input type="file" id="f-ver-img-file" accept="image/*" onchange="previewImg(this,'ver-img-preview','f-ver-img-url')">
        <img id="ver-img-preview" class="img-preview" style="display:none">
        <div class="img-upload-hint">📁 클릭해서 이미지 업로드<br><span style="color:#ccc">또는</span></div>
      </div>
      <input type="text" id="f-ver-img-url" placeholder="이미지 URL 직접 입력" style="margin-top:6px" oninput="syncImgUrl(this,'ver-img-preview')">
    </div>
    <div class="form-group">
      <label>CD 소장 수량</label>
      <input type="number" id="f-ver-owned" min="0" value="0" placeholder="0">
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('ver-modal')">취소</button>
      <button class="btn-save" onclick="saveVersion()">저장</button>
    </div>
  </div>
</div>

<!-- 앨범 이미지 변경 모달 -->
<div class="modal-overlay" id="album-img-modal" onclick="handleOverlay(event,'album-img-modal')">
  <div class="modal">
    <h3>앨범 대표 이미지 변경</h3>
    <div class="form-group">
      <div class="img-upload-area" onclick="document.getElementById('f-album-img-file').click()">
        <input type="file" id="f-album-img-file" accept="image/*" onchange="previewImg(this,'album-img-preview','f-album-img-url')">
        <img id="album-img-preview" class="img-preview" style="display:none">
        <div class="img-upload-hint">📁 클릭해서 이미지 업로드<br><span style="color:#ccc">또는</span></div>
      </div>
      <input type="text" id="f-album-img-url" placeholder="이미지 URL 직접 입력" style="margin-top:6px" oninput="syncImgUrl(this,'album-img-preview')">
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('album-img-modal')">취소</button>
      <button class="btn-save" onclick="saveAlbumImg()">변경하기</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="artist-img-modal" onclick="handleOverlay(event,'artist-img-modal')">
  <div class="modal">

// ── CD 수량 변경 ──────────────────────────────────────────
async function changeOwned(verId, delta){
  const ver=versions.find(v=>v.id===verId);
  if(!ver)return;
  const newVal=Math.max(0,(ver.owned_cd||0)+delta);
  const {error}=await db.from('versions').update({owned_cd:newVal}).eq('id',verId);
  if(error){showToast('저장 실패','err');return;}
  ver.owned_cd=newVal;
  const el=document.getElementById('owned-'+verId);
  if(el)el.textContent=newVal;
  updateStats();
  renderSidebar();
}

// ── 가수 저장 ─────────────────────────────────────────────
async function saveArtist(){
  const name=document.getElementById('f-artist-name').value.trim();
  if(!name){showToast('이름을 입력하세요','err');return;}
  const btn=document.getElementById('artist-save-btn');
  btn.disabled=true; btn.textContent='저장 중...';

  let imgUrl=document.getElementById('f-artist-img-url').value.trim();
  if(pendingImgFile.artist){
    imgUrl=await uploadImg(pendingImgFile.artist,'artist_'+Date.now());
    pendingImgFile.artist=null;
  }
  if(!imgUrl) imgUrl=await fetchArtistImg(name);

  const {data,error}=await db.from('artists').insert([{name,image_url:imgUrl}]).select().single();
  if(error){showToast('저장 실패','err');btn.disabled=false;btn.textContent='추가하기';return;}
  artists.push(data);
  closeModal('artist-modal');
  renderSidebar();
  selectArtist(data);
  showToast(name+' 추가됐어요!','ok');
  btn.disabled=false; btn.textContent='추가하기';
}

// ── iTunes 아티스트 이미지 ────────────────────────────────
async function fetchArtistImg(name){
  try{
    const r=await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(name)}&media=music&limit=1`);
    const d=await r.json();
    if(d.results?.length>0) return d.results[0].artworkUrl100.replace('100x100','300x300');
  }catch(e){}
  return '';
}

// ── Claude AI 앨범 자동검색 ───────────────────────────────
async function fetchAIAlbums(artist){
  if(!CLAUDE_KEY){
    showToast('Claude API 키가 없어요. 앨범을 직접 추가해주세요.','err');
    return;
  }
  const loading=document.getElementById('ai-loading');
  loading.classList.add('show');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':CLAUDE_KEY,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2000,
        messages:[{role:'user',content:`케이팝 가수 "${artist.name}"의 공식 음반 목록을 JSON 배열로만 응답해주세요. 다른 텍스트 없이 순수 JSON만.
형식: [{"title":"앨범명","type":"정규|미니앨범|싱글|EP|리패키지","release_date":"YYYY.MM.DD","tracks":"*타이틀곡\n수록곡2\n수록곡3"}]
CD로 발매된 앨범만 포함. 최신순 정렬.`}]
      })
    });
    const data=await res.json();
    const text=data.content?.[0]?.text||'[]';
    const clean=text.replace(/```json|```/g,'').trim();
    const albumList=JSON.parse(clean);
    for(const al of albumList){
      const {data:saved}=await db.from('albums').insert([{artist_id:artist.id,...al}]).select().single();
      if(saved) albums.push(saved);
    }
    showToast(`${albumList.length}개 앨범을 가져왔어요!`,'ok');
  }catch(e){
    showToast('앨범 자동검색 실패. 직접 추가해주세요.','err');
  }
  loading.classList.remove('show');
  await loadAll(); renderMain(); updateStats(); renderSidebar();
}

function openAlbumImgEdit(id){
  editingAlbumImgId=id;
  const al=albums.find(x=>x.id===id);
  document.getElementById('f-album-img-url').value=al?.image_url||'';
  const prev=document.getElementById('album-img-preview');
  if(al?.image_url){prev.src=al.image_url;prev.style.display='block';}
  else prev.style.display='none';
  openModal('album-img-modal');
}
async function saveAlbumImg(){
  const al=albums.find(x=>x.id===editingAlbumImgId);
  if(!al)return;
  let imgUrl=document.getElementById('f-album-img-url').value.trim();
  if(pendingImgFile.ver){
    imgUrl=await uploadImg(pendingImgFile.ver,'album_'+Date.now());
    pendingImgFile.ver=null;
  }
  const {error}=await db.from('albums').update({image_url:imgUrl}).eq('id',al.id);
  if(error){showToast('저장 실패','err');return;}
  al.image_url=imgUrl;
  closeModal('album-img-modal');
  renderMain();
  showToast('이미지가 변경됐어요!','ok');
}

  pendingImgFile.artist=null;
  openModal('artist-img-modal');
}
async function saveArtistImg(){
  const a=artists.find(x=>x.id===editingArtistImgId);
  if(!a)return;
  let imgUrl=document.getElementById('f-artist-img-edit-url').value.trim();
  if(pendingImgFile.artist){
    imgUrl=await uploadImg(pendingImgFile.artist,'artist_'+Date.now());
    pendingImgFile.artist=null;
  }
  const {error}=await db.from('artists').update({image_url:imgUrl}).eq('id',a.id);
  if(error){showToast('저장 실패','err');return;}
  a.image_url=imgUrl;
  closeModal('artist-img-modal');
  renderSidebar();
  showToast('이미지가 변경됐어요!','ok');
}
function openBulkModal(){
  document.getElementById('f-ai-artist').value=selArtist?.name||'';
  document.getElementById('ai-result-area').style.display='none';
  document.getElementById('ai-preview').innerHTML='';
  const btn=document.getElementById('ai-search-btn');
  btn.disabled=false; btn.textContent='🔍 검색하기';
  btn.onclick=fetchAIAlbums;
  openModal('bulk-modal');
}

async function fetchAIAlbums(){
  const name=document.getElementById('f-ai-artist').value.trim();
  if(!name){showToast('가수 이름을 입력하세요','err');return;}
  if(!selArtist){showToast('먼저 가수를 선택하세요','err');return;}
  const btn=document.getElementById('ai-search-btn');
  const loading=document.getElementById('ai-loading');
  const resultArea=document.getElementById('ai-result-area');
  const preview=document.getElementById('ai-preview');
  btn.disabled=true; btn.textContent='검색 중...';
  resultArea.style.display='block';
  loading.style.display='flex';
  preview.innerHTML='';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:3000,
        messages:[{role:'user',content:`케이팝 가수 "${name}"의 공식 음반 목록을 JSON 배열로만 응답해주세요. 다른 텍스트 없이 순수 JSON만.
형식: [{"title":"앨범명","type":"정규|미니앨범|싱글|EP|리패키지","release_date":"YYYY.MM.DD","tracks":"*타이틀곡\\n수록곡2\\n수록곡3"}]
CD로 발매된 앨범만 포함. 최신순 정렬.`}]
      })
    });
    const data=await res.json();
    const text=data.content?.[0]?.text||'[]';
    const clean=text.replace(/```json|```/g,'').trim();
    const albumList=JSON.parse(clean);
    loading.style.display='none';
    preview.innerHTML=albumList.map(al=>`
      <div style="padding:8px 0;border-bottom:.5px solid var(--border)">
        <div style="font-weight:500;font-size:12px">${al.title} <span style="color:var(--text3);font-size:10px">${al.type} · ${al.release_date||''}</span></div>
        <div style="color:var(--text3);font-size:11px;margin-top:2px">${(al.tracks||'').split('\\n').slice(0,3).join(', ')}${(al.tracks||'').split('\\n').length>3?'...':''}</div>
      </div>`).join('');
    btn.disabled=false;
    btn.textContent=`✅ ${albumList.length}개 앨범 추가하기`;
    btn.onclick=()=>saveAIAlbums(albumList);
  }catch(e){
    loading.style.display='none';
    preview.innerHTML=`<div style="color:var(--red);font-size:12px">검색 실패. 다시 시도해주세요.</div>`;
    btn.disabled=false; btn.textContent='🔍 다시 검색';
    btn.onclick=fetchAIAlbums;
  }
}

async function saveAIAlbums(albumList){
  if(!selArtist)return;
  const btn=document.getElementById('ai-search-btn');
  btn.disabled=true; btn.textContent='저장 중...';
  let count=0;
  for(const al of albumList){
    const {data,error}=await db.from('albums').insert([{artist_id:selArtist.id,...al}]).select().single();
    if(!error&&data){albums.push(data);count++;}
  }
  closeModal('bulk-modal');
  renderMain(); updateStats(); renderSidebar();
  showToast(`${count}개 앨범이 추가됐어요!`,'ok');
  btn.disabled=false;
}

function openAlbumModal(){ editingAlbumId=null; document.getElementById('f-album-title').value=''; document.getElementById('f-album-type').value='정규'; document.getElementById('f-album-date').value=''; document.getElementById('f-album-tracks').value=''; openModal('album-modal'); }
async function saveAlbum(){
  const title=document.getElementById('f-album-title').value.trim();
  if(!title||!selArtist){showToast('앨범 제목을 입력하세요','err');return;}
  const payload={artist_id:selArtist.id,title,type:document.getElementById('f-album-type').value,release_date:document.getElementById('f-album-date').value.trim(),tracks:document.getElementById('f-album-tracks').value.trim()};
  const {data,error}=await db.from('albums').insert([payload]).select().single();
  if(error){showToast('저장 실패','err');return;}
  albums.push(data);
  closeModal('album-modal');
  selAlbum=data; renderMain(); updateStats();
  showToast('앨범이 추가됐어요!','ok');
}

// ── 버전 저장 ─────────────────────────────────────────────
function openVerModal(){ editingVerId=null; document.getElementById('f-ver-name').value=''; document.getElementById('f-ver-img-url').value=''; document.getElementById('f-ver-owned').value='0'; document.getElementById('ver-img-preview').style.display='none'; pendingImgFile.ver=null; openModal('ver-modal'); }
function openVerEditModal(id){
  const v=versions.find(x=>x.id===id);
  if(!v)return;
  editingVerId=id;
  document.getElementById('f-ver-name').value=v.name;
  document.getElementById('f-ver-img-url').value=v.image_url||'';
  document.getElementById('f-ver-owned').value=v.owned_cd||0;
  const prev=document.getElementById('ver-img-preview');
  if(v.image_url){prev.src=v.image_url;prev.style.display='block';}else{prev.style.display='none';}
  openModal('ver-modal');
}
async function saveVersion(){
  const name=document.getElementById('f-ver-name').value.trim();
  if(!name||!selAlbum){showToast('버전 이름을 입력하세요','err');return;}
  let imgUrl=document.getElementById('f-ver-img-url').value.trim();
  if(pendingImgFile.ver){
    imgUrl=await uploadImg(pendingImgFile.ver,'ver_'+Date.now());
    pendingImgFile.ver=null;
  }
  const owned=parseInt(document.getElementById('f-ver-owned').value)||0;
  if(editingVerId){
    const {error}=await db.from('versions').update({name,image_url:imgUrl,owned_cd:owned}).eq('id',editingVerId);
    if(error){showToast('수정 실패','err');return;}
    const v=versions.find(x=>x.id===editingVerId);
    if(v){v.name=name;v.image_url=imgUrl;v.owned_cd=owned;}
  } else {
    const {data,error}=await db.from('versions').insert([{album_id:selAlbum.id,name,image_url:imgUrl,owned_cd:owned}]).select().single();
    if(error){showToast('저장 실패','err');return;}
    versions.push(data);
    selVersion=data;
  }
  closeModal('ver-modal');
  renderMain(); updateStats(); renderSidebar();
  showToast('저장됐어요!','ok');
}

// ── 이미지 업로드 ─────────────────────────────────────────
async function uploadImg(file, name){
  const ext=file.name.split('.').pop();
  const path=`${name}.${ext}`;
  const {error}=await db.storage.from('album-images').upload(path,file,{upsert:true});
  if(error) return '';
  const {data}=db.storage.from('album-images').getPublicUrl(path);
  return data.publicUrl||'';
}
function previewImg(input, previewId, urlInputId){
  const file=input.files[0];
  if(!file)return;
  const key=previewId.includes('artist')?'artist':'ver';
  pendingImgFile[key]=file;
  const reader=new FileReader();
  reader.onload=e=>{
    const prev=document.getElementById(previewId);
    prev.src=e.target.result; prev.style.display='block';
  };
  reader.readAsDataURL(file);
}
function syncImgUrl(input, previewId){
  const prev=document.getElementById(previewId);
  if(input.value){prev.src=input.value;prev.style.display='block';}
  else prev.style.display='none';
}
function openVerImgEdit(verId){
  openVerEditModal(verId);
}

// ── 삭제 ─────────────────────────────────────────────────
async function deleteArtist(id){
  if(!confirm('이 가수와 모든 앨범을 삭제할까요?'))return;
  const myAlbums=albums.filter(a=>a.artist_id===id);
  for(const al of myAlbums){
    await db.from('versions').delete().eq('album_id',al.id);
  }
  await db.from('albums').delete().eq('artist_id',id);
  await db.from('artists').delete().eq('id',id);
  artists=artists.filter(a=>a.id!==id);
  albums=albums.filter(a=>a.artist_id!==id);
  versions=versions.filter(v=>!myAlbums.some(a=>a.id===v.album_id));
  selArtist=null; selAlbum=null; selVersion=null;
  renderSidebar(); renderMain(); updateStats();
  showToast('삭제됐어요','err');
}
async function deleteAlbum(id){
  if(!confirm('이 앨범을 삭제할까요?'))return;
  await db.from('versions').delete().eq('album_id',id);
  await db.from('albums').delete().eq('id',id);
  albums=albums.filter(a=>a.id!==id);
  versions=versions.filter(v=>v.album_id!==id);
  selAlbum=null; selVersion=null;
  renderMain(); updateStats(); renderSidebar();
  showToast('삭제됐어요','err');
}
async function deleteVersion(id){
  if(!confirm('이 버전을 삭제할까요?'))return;
  await db.from('versions').delete().eq('id',id);
  versions=versions.filter(v=>v.id!==id);
  selVersion=null;
  renderMain(); updateStats(); renderSidebar();
  showToast('삭제됐어요','err');
}

function handleOverlay(e,id){if(e.target===document.getElementById(id))closeModal(id);}

}

// ── 토스트 ────────────────────────────────────────────────
let toastTimer;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show '+(type||'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.className='toast';},2200);
}
